name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.os }} / Node 22.18
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-node22.18-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**', 'src/**', 'next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-next-node22.18-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-next-node22.18-

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build Sites target
        run: npm run build

      - name: Build static Pages export
        run: npm run build:pages
        env:
          DEPLOY_TARGET: github-pages
